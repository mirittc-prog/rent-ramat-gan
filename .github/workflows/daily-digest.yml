name: עדכון יומי — דירות להשכרה ברמת גן

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pip install anthropic requests
        run: pip install anthropic requests

      - name: Generate digest and send email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python generate_digest.py

      - name: Commit and push updated digest
        run: |
          git config --global user.email "digest-bot@noreply.github.com"
          git config --global user.name "Rent Digest Bot"
          git add index.html
          git diff --staged --quiet || git commit -m "🏠 עדכון יומי — $(date +'%d/%m/%Y')"
          git pull --rebase origin main
          git push
