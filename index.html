<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏠 דירות להשכרה ברמת גן</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d0d14;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      direction: rtl;
    }
    .container { max-width: 600px; padding: 40px 24px; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { color: #4a9eff; font-size: 28px; margin-bottom: 12px; }
    p { color: #888; font-size: 16px; line-height: 1.7; margin-bottom: 16px; }
    .badge {
      display: inline-block;
      background: #1e1e2e;
      border: 1px solid #2a2a3e;
      color: #4a9eff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🏠</div>
    <h1>דירות להשכרה ברמת גן</h1>
    <p>הדף הזה מתעדכן אוטומטית כל יום בצהריים עם מודעות מפייסבוק ופלטפורמות נוספות.</p>
    <p>העדכון הראשון יגיע בקרוב — בדקי את תיבת המייל שלך!</p>
    <div class="badge">⏳ ממתין לעדכון הראשון...</div>
  </div>
</body>
</html>
